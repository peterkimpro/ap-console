<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AP Console</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    }
    h1 { font-size: 20px; color: #333; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input[type="password"], textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus, textarea:focus { border-color: #555; }
    textarea { resize: vertical; min-height: 72px; font-family: inherit; }
    .hint { font-size: 12px; color: #aaa; margin-bottom: 20px; line-height: 1.5; }
    .hint a { color: #555; }
    .action-label { font-size: 14px; font-weight: 700; color: #222; margin-bottom: 14px; }
    .actions { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.8; transform: scale(0.98); }
    .btn-approve  { background: #28a745; color: white; font-size: 18px; padding: 20px; }
    .btn-image    { background: #17a2b8; color: white; }
    .btn-edit     { background: #6f42c1; color: white; }
    .btn-regen    { background: #6c757d; color: white; }
    .btn-restore  { background: #f57c00; color: white; }
    .btn-submit   { background: #555; color: white; margin-top: 4px; }
    .btn-disabled { opacity: 0.4; pointer-events: none; }

    #token-section { margin-bottom: 24px; }
    #token-saved   { display: none; font-size: 13px; color: #28a745; margin-bottom: 20px; font-weight: 600; }
    #feedback-section { display: none; margin-bottom: 8px; }
    #status {
      display: none;
      margin-top: 16px;
      padding: 18px 16px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
    }
    .status-ok    { background: #d4edda; color: #155724; }
    .status-err   { background: #f8d7da; color: #721c24; }
    .status-spin  { background: #cce5ff; color: #004085; }
    .divider { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    .approve-box {
      background: #f0faf0;
      border: 1.5px solid #c3e6cb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .approve-box p { font-size: 14px; color: #333; line-height: 1.5; margin-bottom: 12px; }
    .approve-box strong { color: #155724; }
    .token-warning {
      display: none;
      background: #fff3cd;
      border: 1.5px solid #ffc107;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #856404;
      line-height: 1.5;
    }
    .token-warning a { color: #555; font-weight: 600; }
  </style>
</head>
<body>
<div class="card">
  <h1>AP Console</h1>
  <p class="subtitle" id="action-subtitle">Controls</p>

  <div id="status"></div>

  <div id="token-warning" class="token-warning">
    Token needs <strong>repo</strong> + <strong>workflow</strong> scopes.<br><br>
    <a href="https://github.com/settings/tokens/new?scopes=repo,workflow&description=AP+Console" target="_blank">
      Create a new token
    </a>, then tap "Change" below.
  </div>

  <div id="token-section">
    <label for="pat">Access Token</label>
    <input type="password" id="pat" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    <p class="hint">
      Required once to run actions.<br>
      <a href="https://github.com/settings/tokens/new?scopes=repo,workflow&description=AP+Console" target="_blank">
        Create token
      </a> — select <strong>repo</strong> + <strong>workflow</strong>. Stored locally. Use 90-day expiry.
    </p>
    <button class="btn btn-submit" onclick="saveToken()">Save</button>
  </div>
  <div id="token-saved" style="display:none">
    <span style="font-size:13px;color:#28a745;font-weight:600;">Saved</span>
    <button onclick="resetToken()" style="margin-left:12px;background:none;border:none;font-size:12px;color:#888;cursor:pointer;text-decoration:underline;">Change</button>
  </div>

  <div id="approve-section" style="display:none">
    <div class="approve-box">
      <p><strong>Ready?</strong> Tap to push live.</p>
      <button class="btn btn-approve" onclick="triggerPost()">Push</button>
    </div>
    <hr class="divider">
  </div>

  <p class="action-label" id="action-label">Actions:</p>

  <div id="feedback-section">
    <label for="feedback" id="feedback-label">Notes</label>
    <textarea id="feedback" placeholder="optional notes"></textarea>
  </div>

  <div class="actions" id="action-buttons">
    <button class="btn btn-image"  onclick="trigger('new-image')">Regen Asset</button>
    <button class="btn btn-edit"   onclick="trigger('edit-post')">Revise</button>
    <button class="btn btn-regen"  onclick="trigger('full-regenerate')">Start Over</button>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const R = params.get('r') || '';
  const W = params.get('w') || 'iterate.yml';
  const preAction = params.get('action') || '';
  const preFeedback = params.get('feedback') || '';

  if (!R) {
    document.querySelector('.card').innerHTML = '<h1>AP Console</h1><p style="color:#888;margin-top:12px;">Missing configuration.</p>';
  }

  // Pre-fill feedback from URL parameter (used by restore-draft, edit-post, etc.)
  if (preFeedback) {
    document.getElementById('feedback').value = preFeedback;
  }

  if (preAction) {
    const labels = {
      'new-image': 'Regen Asset',
      'edit-post': 'Revise',
      'full-regenerate': 'Start Over',
      'restore-draft': 'Select Draft v' + preFeedback,
    };
    document.getElementById('action-subtitle').textContent = labels[preAction] || 'Controls';
    document.getElementById('action-label').textContent = 'Confirm:';

    document.getElementById('action-buttons').innerHTML = '';
    const btn = document.createElement('button');
    const cls = {
      'new-image': 'btn-image',
      'edit-post': 'btn-edit',
      'full-regenerate': 'btn-regen',
      'restore-draft': 'btn-restore',
    }[preAction] || 'btn-submit';
    btn.className = `btn ${cls}`;
    btn.textContent = labels[preAction] || preAction;
    btn.onclick = () => trigger(preAction);
    document.getElementById('action-buttons').appendChild(btn);

    const other = document.createElement('a');
    other.href = `${window.location.pathname}?r=${encodeURIComponent(R)}&w=${encodeURIComponent(W)}`;
    other.style.cssText = 'display:block;text-align:center;font-size:13px;color:#888;margin-top:8px;';
    other.textContent = 'All options';
    document.getElementById('action-buttons').appendChild(other);

    if (preAction === 'edit-post' || preAction === 'new-image') {
      document.getElementById('feedback-section').style.display = 'block';
      document.getElementById('feedback-label').textContent =
        preAction === 'edit-post' ? 'Notes (optional)' : 'Asset notes (optional)';
    }
    // restore-draft: keep feedback hidden (version is pre-filled from URL)
  } else {
    document.getElementById('approve-section').style.display = 'block';
    document.getElementById('feedback-section').style.display = 'block';
    document.getElementById('feedback-label').textContent = 'Notes (optional)';
  }

  function loadToken() {
    return localStorage.getItem('gh_pat') || '';
  }
  function resetToken() {
    localStorage.removeItem('gh_pat');
    document.getElementById('pat').value = '';
    document.getElementById('token-section').style.display = 'block';
    document.getElementById('token-saved').style.display = 'none';
    document.getElementById('token-warning').style.display = 'none';
  }
  function saveToken() {
    const t = document.getElementById('pat').value.trim();
    if (!t) { alert('Enter your token first.'); return; }
    localStorage.setItem('gh_pat', t);
    document.getElementById('token-section').style.display = 'none';
    document.getElementById('token-saved').style.display = 'block';
    document.getElementById('token-warning').style.display = 'none';
    showStatus('Saved. Try again.', 'ok');
  }

  window.addEventListener('DOMContentLoaded', () => {
    if (loadToken()) {
      document.getElementById('token-section').style.display = 'none';
      document.getElementById('token-saved').style.display = 'block';
    }
  });

  async function triggerPost() {
    const token = loadToken();
    if (!token) {
      document.getElementById('token-section').style.display = 'block';
      document.getElementById('token-saved').style.display = 'none';
      showStatus('Save your token first.', 'err');
      return;
    }
    showStatus('Running...', 'spin');
    try {
      const res = await fetch(`https://api.github.com/repos/${R}/actions/workflows/post.yml/dispatches`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main' }),
      });
      if (res.status === 204) {
        showStatus('Done! Live in ~2 min.', 'ok');
      } else if (res.status === 404) {
        showStatus('Token error. Update scopes (repo + workflow).', 'err');
        document.getElementById('token-warning').style.display = 'block';
      } else {
        const body = await res.json().catch(() => ({}));
        showStatus(`Error ${res.status}: ${body.message || 'Unknown'}`, 'err');
        if (res.status === 401 || res.status === 403) {
          document.getElementById('token-warning').style.display = 'block';
        }
      }
    } catch (e) {
      showStatus(`Network error: ${e.message}`, 'err');
    }
  }

  async function trigger(action) {
    const token = loadToken();
    if (!token) {
      document.getElementById('token-section').style.display = 'block';
      document.getElementById('token-saved').style.display = 'none';
      showStatus('Save your token first.', 'err');
      return;
    }
    const feedback = document.getElementById('feedback').value.trim();

    showStatus('Running...', 'spin');

    try {
      const res = await fetch(`https://api.github.com/repos/${R}/actions/workflows/${W}/dispatches`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          ref: 'main',
          inputs: { action, feedback },
        }),
      });
      if (res.status === 204) {
        showStatus('Triggered. Check email in ~2 min.', 'ok');
      } else if (res.status === 404) {
        showStatus('Token error. Update scopes (repo + workflow).', 'err');
        document.getElementById('token-warning').style.display = 'block';
      } else {
        const body = await res.json().catch(() => ({}));
        showStatus(`Error ${res.status}: ${body.message || 'Unknown'}`, 'err');
        if (res.status === 401 || res.status === 403) {
          document.getElementById('token-warning').style.display = 'block';
        }
      }
    } catch (e) {
      showStatus(`Network error: ${e.message}`, 'err');
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.style.display = 'block';
    el.textContent = msg;
    el.className = `status-${type}`;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
</script>
</body>
</html>
